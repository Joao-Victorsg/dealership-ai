# Integration test overrides
# Redis: set via EnvironmentInitializer (Testcontainer-managed)
# Feign URLs: set via EnvironmentInitializer (WireMock-managed)
# JWKS URI: set via EnvironmentInitializer (pointing to keycloak WireMock)

# Disable retry delays for faster tests
resilience4j.retry.instances.car-api.wait-duration=0ms
resilience4j.retry.instances.client-api.wait-duration=0ms
resilience4j.retry.instances.sales-api.wait-duration=0ms
resilience4j.retry.instances.keycloak.wait-duration=0ms

# Shorter CB wait to enable state transition tests
resilience4j.circuitbreaker.instances.car-api.wait-duration-in-open-state=1s
resilience4j.circuitbreaker.instances.client-api.wait-duration-in-open-state=1s
resilience4j.circuitbreaker.instances.sales-api.wait-duration-in-open-state=1s
resilience4j.circuitbreaker.instances.keycloak.wait-duration-in-open-state=1s

# Shorter sliding window for faster CB open transition in tests
resilience4j.circuitbreaker.instances.car-api.sliding-window-size=3
resilience4j.circuitbreaker.instances.client-api.sliding-window-size=3
resilience4j.circuitbreaker.instances.sales-api.sliding-window-size=3
resilience4j.circuitbreaker.instances.keycloak.sliding-window-size=3

# Disable time limiter (WireMock responses are local — no real network latency)
resilience4j.timelimiter.instances.car-api.timeout-duration=60s
resilience4j.timelimiter.instances.client-api.timeout-duration=60s
resilience4j.timelimiter.instances.sales-api.timeout-duration=60s
resilience4j.timelimiter.instances.keycloak.timeout-duration=60s

# Reduce log noise in tests
logging.level.root=WARN
logging.level.integrated=INFO
logging.level.br.com.dealership=DEBUG

# Disable JPA SQL logging (no JPA in BFF but suppress any warnings)
spring.jpa.show-sql=false
