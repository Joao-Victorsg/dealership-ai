# Server
server.port=${SERVER_PORT:8083}

# ─── Spring Cache ────────────────────────────────────────────────────────────
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# ─── Redis ───────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ─── Virtual Threads ─────────────────────────────────────────────────────────
spring.threads.virtual.enabled=true

# ─── Security / OAuth2 Resource Server ───────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_BASE_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:dealership}/protocol/openid-connect/certs
keycloak.realm=${KEYCLOAK_REALM:dealership}
keycloak.base-url=${KEYCLOAK_BASE_URL:http://localhost:8080}

# ─── OAuth2 Client (Authorization Code + PKCE) ───────────────────────────────
spring.security.oauth2.client.registration.keycloak.client-id=${KEYCLOAK_CLIENT_ID:dealership-bff}
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:changeme}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email,offline_access
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/keycloak

spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_BASE_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:dealership}

# ─── Spring Session (Redis-backed) ───────────────────────────────────────────
spring.session.store-type=redis
spring.session.redis.flush-mode=on-save
spring.session.redis.namespace=dealership:session
server.servlet.session.timeout=1800
server.servlet.session.cookie.name=SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# ─── App-level redirect URIs ─────────────────────────────────────────────────
app.post-login-redirect-uri=${APP_POST_LOGIN_REDIRECT_URI:http://localhost:3000}
app.post-logout-redirect-uri=${APP_POST_LOGOUT_REDIRECT_URI:http://localhost:3000}

# ─── Feign Clients ───────────────────────────────────────────────────────────
spring.cloud.openfeign.client.config.car-api.url=${CAR_API_BASE_URL:http://localhost:8081}
spring.cloud.openfeign.client.config.car-api.connect-timeout=${CAR_API_CONNECT_TIMEOUT:2000}
spring.cloud.openfeign.client.config.car-api.read-timeout=${CAR_API_READ_TIMEOUT:5000}

spring.cloud.openfeign.client.config.client-api.url=${CLIENT_API_BASE_URL:http://localhost:8082}
spring.cloud.openfeign.client.config.client-api.connect-timeout=${CLIENT_API_CONNECT_TIMEOUT:2000}
spring.cloud.openfeign.client.config.client-api.read-timeout=${CLIENT_API_READ_TIMEOUT:5000}

spring.cloud.openfeign.client.config.sales-api.url=${SALES_API_BASE_URL:http://localhost:8083}
spring.cloud.openfeign.client.config.sales-api.connect-timeout=${SALES_API_CONNECT_TIMEOUT:2000}
spring.cloud.openfeign.client.config.sales-api.read-timeout=${SALES_API_READ_TIMEOUT:5000}

spring.cloud.openfeign.client.config.keycloak.url=${KEYCLOAK_BASE_URL:http://localhost:8080}
spring.cloud.openfeign.client.config.keycloak.connect-timeout=${KEYCLOAK_CONNECT_TIMEOUT:2000}
spring.cloud.openfeign.client.config.keycloak.read-timeout=${KEYCLOAK_READ_TIMEOUT:5000}

keycloak.client-id=${KEYCLOAK_CLIENT_ID:dealership-bff}
keycloak.system-client-id=${KEYCLOAK_SYSTEM_CLIENT_ID:dealership-system}
keycloak.system-client-secret=${KEYCLOAK_SYSTEM_CLIENT_SECRET:dealership-system-secret}

# ─── Resilience4j Aspect Order ────────────────────────────────────────────────
# Order: Retry(1) → CircuitBreaker(2) → RateLimiter(3) → TimeLimiter(4) → Bulkhead(5) → call
spring.cloud.openfeign.circuitbreaker.enabled=false
resilience4j.retry.retry-aspect-order=1
resilience4j.circuitbreaker.circuit-breaker-aspect-order=2
resilience4j.ratelimiter.rate-limiter-aspect-order=3
resilience4j.timelimiter.time-limiter-aspect-order=4
# resilience4j.bulkhead.bulkhead-aspect-order=5

# ─── Resilience4j — Car API ───────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.car-api.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.car-api.sliding-window-size=${CAR_API_CB_WINDOW_SIZE:10}
resilience4j.circuitbreaker.instances.car-api.failure-rate-threshold=${CAR_API_CB_FAILURE_RATE:50}
resilience4j.circuitbreaker.instances.car-api.wait-duration-in-open-state=${CAR_API_CB_WAIT_DURATION:30s}
resilience4j.circuitbreaker.instances.car-api.permitted-number-of-calls-in-half-open-state=${CAR_API_CB_HALF_OPEN_CALLS:5}
resilience4j.circuitbreaker.instances.car-api.register-health-indicator=true

resilience4j.retry.instances.car-api.max-attempts=${CAR_API_RETRY_MAX_ATTEMPTS:3}
resilience4j.retry.instances.car-api.wait-duration=${CAR_API_RETRY_WAIT:500ms}
resilience4j.retry.instances.car-api.retry-exceptions=java.io.IOException,feign.RetryableException

resilience4j.ratelimiter.instances.car-api.limit-for-period=${CAR_API_RL_LIMIT:100}
resilience4j.ratelimiter.instances.car-api.limit-refresh-period=${CAR_API_RL_REFRESH:1s}
resilience4j.ratelimiter.instances.car-api.timeout-duration=${CAR_API_RL_TIMEOUT:0}

resilience4j.timelimiter.instances.car-api.timeout-duration=${CAR_API_TL_TIMEOUT:4s}
resilience4j.timelimiter.instances.car-api.cancel-running-future=true

resilience4j.bulkhead.instances.car-api.max-concurrent-calls=${CAR_API_BH_CONCURRENCY:20}
resilience4j.bulkhead.instances.car-api.max-wait-duration=${CAR_API_BH_WAIT:0}

# ─── Resilience4j — Client API ────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.client-api.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.client-api.sliding-window-size=${CLIENT_API_CB_WINDOW_SIZE:10}
resilience4j.circuitbreaker.instances.client-api.failure-rate-threshold=${CLIENT_API_CB_FAILURE_RATE:50}
resilience4j.circuitbreaker.instances.client-api.wait-duration-in-open-state=${CLIENT_API_CB_WAIT_DURATION:30s}
resilience4j.circuitbreaker.instances.client-api.permitted-number-of-calls-in-half-open-state=${CLIENT_API_CB_HALF_OPEN_CALLS:5}
resilience4j.circuitbreaker.instances.client-api.register-health-indicator=true

resilience4j.retry.instances.client-api.max-attempts=${CLIENT_API_RETRY_MAX_ATTEMPTS:3}
resilience4j.retry.instances.client-api.wait-duration=${CLIENT_API_RETRY_WAIT:500ms}
resilience4j.retry.instances.client-api.retry-exceptions=java.io.IOException,feign.RetryableException

resilience4j.ratelimiter.instances.client-api.limit-for-period=${CLIENT_API_RL_LIMIT:50}
resilience4j.ratelimiter.instances.client-api.limit-refresh-period=${CLIENT_API_RL_REFRESH:1s}
resilience4j.ratelimiter.instances.client-api.timeout-duration=${CLIENT_API_RL_TIMEOUT:0}

resilience4j.timelimiter.instances.client-api.timeout-duration=${CLIENT_API_TL_TIMEOUT:4s}
resilience4j.timelimiter.instances.client-api.cancel-running-future=true

resilience4j.bulkhead.instances.client-api.max-concurrent-calls=${CLIENT_API_BH_CONCURRENCY:20}
resilience4j.bulkhead.instances.client-api.max-wait-duration=${CLIENT_API_BH_WAIT:0}

# ─── Resilience4j — Sales API (semaphore bulkhead; NO retry on POST /sales) ──
resilience4j.circuitbreaker.instances.sales-api.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.sales-api.sliding-window-size=${SALES_API_CB_WINDOW_SIZE:10}
resilience4j.circuitbreaker.instances.sales-api.failure-rate-threshold=${SALES_API_CB_FAILURE_RATE:50}
resilience4j.circuitbreaker.instances.sales-api.wait-duration-in-open-state=${SALES_API_CB_WAIT_DURATION:30s}
resilience4j.circuitbreaker.instances.sales-api.permitted-number-of-calls-in-half-open-state=${SALES_API_CB_HALF_OPEN_CALLS:3}
resilience4j.circuitbreaker.instances.sales-api.register-health-indicator=true

resilience4j.retry.instances.sales-api.max-attempts=${SALES_API_RETRY_MAX_ATTEMPTS:3}
resilience4j.retry.instances.sales-api.wait-duration=${SALES_API_RETRY_WAIT:500ms}
resilience4j.retry.instances.sales-api.retry-exceptions=java.io.IOException,feign.RetryableException

resilience4j.ratelimiter.instances.sales-api.limit-for-period=${SALES_API_RL_LIMIT:20}
resilience4j.ratelimiter.instances.sales-api.limit-refresh-period=${SALES_API_RL_REFRESH:1s}
resilience4j.ratelimiter.instances.sales-api.timeout-duration=${SALES_API_RL_TIMEOUT:0}

resilience4j.timelimiter.instances.sales-api.timeout-duration=${SALES_API_TL_TIMEOUT:4s}
resilience4j.timelimiter.instances.sales-api.cancel-running-future=true

# Semaphore bulkhead — lower concurrency to protect against purchase surges
resilience4j.bulkhead.instances.sales-api.max-concurrent-calls=${SALES_API_BH_CONCURRENCY:10}
resilience4j.bulkhead.instances.sales-api.max-wait-duration=${SALES_API_BH_WAIT:0}

# ─── Resilience4j — Keycloak ─────────────────────────────────────────────────
resilience4j.circuitbreaker.instances.keycloak.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.keycloak.sliding-window-size=${KEYCLOAK_CB_WINDOW_SIZE:10}
resilience4j.circuitbreaker.instances.keycloak.failure-rate-threshold=${KEYCLOAK_CB_FAILURE_RATE:50}
resilience4j.circuitbreaker.instances.keycloak.wait-duration-in-open-state=${KEYCLOAK_CB_WAIT_DURATION:30s}
resilience4j.circuitbreaker.instances.keycloak.permitted-number-of-calls-in-half-open-state=${KEYCLOAK_CB_HALF_OPEN_CALLS:5}
resilience4j.circuitbreaker.instances.keycloak.register-health-indicator=true

resilience4j.retry.instances.keycloak.max-attempts=${KEYCLOAK_RETRY_MAX_ATTEMPTS:3}
resilience4j.retry.instances.keycloak.wait-duration=${KEYCLOAK_RETRY_WAIT:500ms}
resilience4j.retry.instances.keycloak.retry-exceptions=java.io.IOException,feign.RetryableException

resilience4j.ratelimiter.instances.keycloak.limit-for-period=${KEYCLOAK_RL_LIMIT:50}
resilience4j.ratelimiter.instances.keycloak.limit-refresh-period=${KEYCLOAK_RL_REFRESH:1s}
resilience4j.ratelimiter.instances.keycloak.timeout-duration=${KEYCLOAK_RL_TIMEOUT:0}

resilience4j.timelimiter.instances.keycloak.timeout-duration=${KEYCLOAK_TL_TIMEOUT:4s}
resilience4j.timelimiter.instances.keycloak.cancel-running-future=true

resilience4j.bulkhead.instances.keycloak.max-concurrent-calls=${KEYCLOAK_BH_CONCURRENCY:20}
resilience4j.bulkhead.instances.keycloak.max-wait-duration=${KEYCLOAK_BH_WAIT:0}

# New Relic — disable Micrometer's direct Insights API exporter.
# Metrics are collected by the New Relic Java agent instead (javaagent in Dockerfile).
management.newrelic.metrics.export.enabled=false

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ─── SpringDoc / Swagger UI ──────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
