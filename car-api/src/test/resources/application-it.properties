server.port=8080

# JPA / Hibernate (Flyway handles schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis cache
spring.cache.type=redis

# Jackson
spring.jackson.default-property-inclusion=non_null

# Docker Compose (disable for IT — containers are managed by Testcontainers)
spring.docker.compose.enabled=false

# S3 Configuration (overridden by EnvironmentInitializer)
app.s3.bucket=car-images
app.s3.presigned-url-ttl=900

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,flyway
management.endpoint.health.show-details=when-authorized

# Pagination
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100
