spring.application.name=car-api

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=${SERVER_PORT:8080}

# Virtual Threads
spring.threads.virtual.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# OAuth2 JWT Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:https://idp.example.com/realms/dealership}

# S3 Configuration
app.s3.bucket=${S3_BUCKET:car-images}
app.s3.region=${S3_REGION:us-east-1}
app.s3.endpoint=${S3_ENDPOINT:}
app.s3.presigned-url-ttl=${S3_PRESIGNED_URL_TTL:900}

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,flyway
management.endpoint.health.show-details=when-authorized

# New Relic — disable Micrometer's direct Insights API exporter.
# Metrics are collected by the New Relic Java agent instead (javaagent in Dockerfile).
management.newrelic.metrics.export.enabled=false

# Pagination
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# Jackson
spring.jackson.default-property-inclusion=non_null
