# Local development profile — active when SPRING_PROFILES_ACTIVE=local
#
# Overrides the OAuth2 resource-server settings from application.properties
# to point at the Keycloak container running in docker-compose.
#
# "keycloak" resolves inside the dealership-ai-network Docker network.
# From the host use http://localhost:8180 for the admin UI or manual testing.

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          # Used to validate the 'iss' claim in every received JWT.
          # Tokens not issued by this realm are rejected.
          issuer-uri: http://keycloak:8080/realms/dealership

          # Explicit JWKS endpoint — Spring Boot uses this for key fetching
          # and falls back to the issuer discovery document otherwise.
          jwk-set-uri: http://keycloak:8080/realms/dealership/protocol/openid-connect/certs

          # Audience validation — tokens must include 'dealership' in their
          # 'aud' claim.  This rejects tokens issued for unrelated clients
          # that happen to reach this service (e.g. tokens from the master
          # realm or clients without the dealership-audience scope).
          audiences:
            - dealership
