spring.application.name=sales-api

# JPA / Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Virtual threads
spring.threads.virtual.enabled=true

# OAuth2 Resource Server (override jwks-uri in test via EnvironmentInitializer)
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:http://localhost:8080/realms/dealership/protocol/openid-connect/certs}
spring.security.oauth2.resourceserver.jwt.audiences=dealership

# DataSource (override in test via EnvironmentInitializer)
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/salesdb}
spring.datasource.username=${DATASOURCE_USERNAME:sales}
spring.datasource.password=${DATASOURCE_PASSWORD:sales}
spring.datasource.driver-class-name=org.postgresql.Driver

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# SNS (override endpoint in test via EnvironmentInitializer)
app.sns.topic-arn=${SNS_TOPIC_ARN:arn:aws:sns:us-east-1:000000000000:sale-events}
spring.cloud.aws.region.static=${AWS_REGION:us-east-1}

# Resilience4j — aspect ordering (Retry wraps CircuitBreaker)
resilience4j.retry.retry-aspect-order=2
resilience4j.circuitbreaker.circuit-breaker-aspect-order=3

# Resilience4j — SNS Retry
resilience4j.retry.instances.sns.max-attempts=3
resilience4j.retry.instances.sns.wait-duration=500ms
resilience4j.retry.instances.sns.retry-exceptions=software.amazon.awssdk.services.sns.model.SnsException

# Resilience4j — SNS CircuitBreaker
resilience4j.circuitbreaker.instances.sns.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.sns.sliding-window-size=10
resilience4j.circuitbreaker.instances.sns.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.sns.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.sns.permitted-number-of-calls-in-half-open-state=5

# Jackson
spring.jackson.default-property-inclusion=NON_NULL

# Actuator
management.endpoint.health.probes.enabled=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.enable.resilience4j=true

# Logging
logging.level.br.com.dealership.salesapi.config.Resilience4jConfig=INFO
logging.level.io.github.resilience4j=WARN

# OpenAPI
springdoc.api-docs.path=/api-docs
