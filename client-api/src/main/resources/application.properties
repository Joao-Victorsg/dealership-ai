spring.application.name=client-api

# ─── Datasource ───────────────────────────────────────────────────────────────
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# ─── Flyway ───────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ─── Redis ────────────────────────────────────────────────────────────────────
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=86400000

# ─── Security / OAuth2 ────────────────────────────────────────────────────────
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWKS_URI:https://idp.example.com/realms/dealership/protocol/openid-connect/certs}

# ─── CPF Encryption ───────────────────────────────────────────────────────────
app.cpf.encryption-key=${CPF_ENCRYPTION_KEY}
app.cpf.hmac-secret=${CPF_HMAC_SECRET}

# ─── ViaCEP ───────────────────────────────────────────────────────────────────
app.viacep.base-url=${VIACEP_BASE_URL:https://viacep.com.br}

# ─── Feign — ViaCEP client timeouts ──────────────────────────────────────────
spring.cloud.openfeign.client.config.viacep.connect-timeout=5000
spring.cloud.openfeign.client.config.viacep.read-timeout=5000

# ─── Resilience4j — ViaCEP circuit breaker ────────────────────────────────────
resilience4j.circuitbreaker.instances.viacep.sliding-window-size=10
resilience4j.circuitbreaker.instances.viacep.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.viacep.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.viacep.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.viacep.register-health-indicator=true
resilience4j.timelimiter.instances.viacep.timeout-duration=2s

# ─── Actuator ─────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,readiness,liveness
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
