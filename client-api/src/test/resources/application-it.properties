# IT profile — dummy placeholder values overridden at runtime by EnvironmentInitializer
# (all container-backed properties are replaced before beans are created)

# Docker Compose (disable for IT — containers managed by Testcontainers)
spring.docker.compose.enabled=false

# Datasource (overridden by EnvironmentInitializer at runtime)
spring.datasource.url=jdbc:postgresql://localhost:5432/dealershipdb
spring.datasource.username=dealership
spring.datasource.password=12345678

# JPA / Hibernate (Flyway handles schema)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis (overridden by EnvironmentInitializer at runtime)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Required so JwtDecoder auto-configuration fires; real URL injected by EnvironmentInitializer
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/.well-known/jwks.json

app.viacep.base-url=http://localhost:9998

# 32 all-zero bytes (Base64-encoded) — deterministic test key for CPF encryption
app.cpf.encryption-key=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
app.cpf.hmac-secret=test-hmac-secret-for-integration-tests-only

# Smaller sliding window so circuit breaker trips sooner in tests
resilience4j.circuitbreaker.instances.viacep.sliding-window-size=3
resilience4j.circuitbreaker.instances.viacep.wait-duration-in-open-state=1s
