# Test overrides — env-var-dependent properties resolved here so Spring context starts cleanly.
# @ServiceConnection from TestcontainersConfiguration overrides spring.datasource.* and spring.data.redis.*

spring.datasource.url=jdbc:postgresql://localhost:5432/test
spring.datasource.username=test
spring.datasource.password=test

spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWKS URI overridden per-test via @DynamicPropertySource (WireMock) or @MockBean JwtDecoder
spring.security.oauth2.resourceserver.jwt.jwks-uri=http://localhost:0/realms/dealership/protocol/openid-connect/certs

# 32-byte all-zero key for test CPF encryption (Base64-encoded)
app.cpf.encryption-key=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
app.cpf.hmac-secret=test-hmac-secret-for-integration-tests-only

app.viacep.base-url=http://localhost:9999
